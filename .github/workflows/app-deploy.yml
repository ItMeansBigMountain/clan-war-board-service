name: app-deploy

on:
  pull_request:
    paths:
      - 'api/**'
      - 'web/**'
      - 'tests/**'
      - '.github/workflows/app-deploy.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'web/**'
      - 'tests/**'
      - '.github/workflows/app-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment gate
        type: choice
        options:
          - app-dev
          - app-prod
        default: app-dev

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install API dependencies
        run: python -m pip install -r api/requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

  deploy-api:
    name: Deploy Static Web App API
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'app-dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight required GitHub variables
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_STATIC_WEB_APP_NAME: ${{ vars.AZURE_STATIC_WEB_APP_NAME }}
        run: |
          missing=0
          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_RESOURCE_GROUP AZURE_STATIC_WEB_APP_NAME; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set. Configure it as a repository/environment variable before running this workflow."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Run the infra pipeline first, then set app variables from Terraform outputs."
            exit 1
          fi

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get Static Web App deployment token
        id: swa-token
        shell: bash
        run: |
          token=$(az staticwebapp secrets list \
            --name "${{ vars.AZURE_STATIC_WEB_APP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "properties.apiKey" -o tsv)
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Deploy Static Web App with managed API
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web
          api_location: api
          output_location: .

      - name: Verify health endpoint
        shell: bash
        run: |
          hostname=$(az staticwebapp show \
            --name "${{ vars.AZURE_STATIC_WEB_APP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "defaultHostname" -o tsv)
          url="https://${hostname}/api/health"
          echo "Checking $url"
          curl --fail --retry 8 --retry-delay 10 --retry-connrefused "$url"
